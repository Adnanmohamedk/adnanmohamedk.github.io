<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload and Download</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <form id="file-upload-form" action="upload.php" method="POST" enctype="multipart/form-data">
            <div class="file-upload">
                <input type="file" id="file-input" name="file" accept="image/*">
                <label for="file-input" class="file-label">
                    <div class="file-icon"></div>
                    <div class="file-text">Drag & Drop or Click to Upload</div>
                </label>
            </div>
            <button type="submit" class="upload-button">Upload</button>
        </form>
        <div class="preview-box" id="preview-box">
            <img id="preview-image" alt="Preview" />
            <a id="download-link" href="#" download="uploaded_image.jpg">
                <button class="download-button" id="download-button" disabled>Download</button>
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
